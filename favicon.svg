<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#0f1520"/>
    </linearGradient>
    <linearGradient id="bell" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00A8DD"/>
    </linearGradient>
    <clipPath id="r">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#r)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Bell simplified for small sizes -->
    <g transform="translate(220, 240)">
      <path d="M0,-80 C-44,-80 -80,-44 -80,0 L-80,24 C-80,32 -88,38 -96,42 L-96,50 L96,50 L96,42 C88,38 80,32 80,24 L80,0 C80,-44 44,-80 0,-80 Z"
            fill="url(#bell)"/>
      <circle cx="0" cy="64" r="16" fill="#00D4FF"/>
      <circle cx="0" cy="-80" r="10" fill="#00D4FF"/>
    </g>

    <!-- Three arcs -->
    <g transform="translate(220, 240)">
      <path d="M105,-35 C122,-17 122,17 105,35"
            fill="none" stroke="#00D4FF" stroke-width="16" stroke-linecap="round"/>
      <path d="M138,-55 C165,-30 165,30 138,55"
            fill="none" stroke="#00DDA0" stroke-width="16" stroke-linecap="round"/>
      <path d="M170,-75 C208,-40 208,40 170,75"
            fill="none" stroke="#00FF88" stroke-width="16" stroke-linecap="round"/>
    </g>
  </g>
</svg>
